<svg viewBox="0 0 450 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .ameli-title { font-family: Arial, sans-serif; font-weight: bold; }
      .ameli-main { font-size: 36px; font-weight: 900; }
      .ameli-tagline { font-size: 12px; font-weight: 600; }
    </style>
  </defs>

  <!-- Logo circulaire avec silhouettes -->
  <circle cx="60" cy="70" r="50" fill="none" stroke="#1746A2" stroke-width="2"/>
  
  <!-- Arc du texte "SÉCURITÉ SOCIALE" en haut -->
  <path id="topArc" d="M 20 70 A 50 50 0 0 1 100 70" fill="none"/>
  <text font-size="10" font-weight="bold" fill="#1746A2" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      SÉCURITÉ SOCIALE
    </textPath>
  </text>

  <!-- Silhouettes enfants dans le cercle -->
  <g fill="#1746A2">
    <!-- Enfant gauche -->
    <circle cx="35" cy="65" r="7"/>
    <ellipse cx="35" cy="78" rx="4" ry="10"/>
    <ellipse cx="30" cy="87" rx="2.5" ry="5"/>
    <ellipse cx="40" cy="87" rx="2.5" ry="5"/>

    <!-- Enfant milieu (plus haut) -->
    <circle cx="60" cy="55" r="8"/>
    <ellipse cx="60" cy="70" rx="5" ry="11"/>
    <ellipse cx="53" cy="81" rx="3" ry="5"/>
    <ellipse cx="67" cy="81" rx="3" ry="5"/>

    <!-- Enfant droite -->
    <circle cx="85" cy="68" r="7"/>
    <ellipse cx="85" cy="81" rx="4" ry="10"/>
    <ellipse cx="80" cy="90" rx="2.5" ry="5"/>
    <ellipse cx="90" cy="90" rx="2.5" ry="5"/>
  </g>

  <!-- Texte principal -->
  <text x="130" y="75" class="ameli-title ameli-main" fill="#1746A2">l'Assurance</text>
  <text x="130" y="115" class="ameli-title ameli-main" fill="#1746A2">Maladie</text>

  <!-- Tagline -->
  <text x="130" y="138" class="ameli-title ameli-tagline" fill="#1746A2">Agir ensemble, protéger chacun</text>
</svg>