<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; }
      .logo-security { font-size: 18px; letter-spacing: 3px; }
      .logo-ameli { font-size: 68px; font-weight: 900; }
      .logo-assurance { font-size: 50px; font-weight: 700; }
    </style>
  </defs>

  <!-- Silhouettes de la famille (enfants jouant) -->
  <g id="family-silhouettes" fill="#1746A2">
    <!-- Enfant 1 (gauche - qui court) -->
    <circle cx="45" cy="60" r="12"/>
    <ellipse cx="45" cy="85" rx="8" ry="16"/>
    <ellipse cx="35" cy="98" rx="5" ry="10"/>
    <ellipse cx="55" cy="98" rx="5" ry="10"/>
    <ellipse cx="38" cy="72" rx="5" ry="13"/>
    <ellipse cx="52" cy="65" rx="5" ry="15"/>

    <!-- Enfant 2 (milieu - qui saute) -->
    <circle cx="80" cy="50" r="13"/>
    <ellipse cx="80" cy="80" rx="9" ry="18"/>
    <ellipse cx="70" cy="100" rx="5" ry="10"/>
    <ellipse cx="90" cy="100" rx="5" ry="10"/>
    <ellipse cx="65" cy="62" rx="6" ry="18"/>
    <ellipse cx="95" cy="62" rx="6" ry="18"/>

    <!-- Enfant 3 (droite - debout) -->
    <circle cx="115" cy="65" r="12"/>
    <ellipse cx="115" cy="90" rx="8" ry="17"/>
    <ellipse cx="105" cy="102" rx="5" ry="10"/>
    <ellipse cx="125" cy="102" rx="5" ry="10"/>
    <ellipse cx="100" cy="75" rx="5" ry="14"/>
    <ellipse cx="130" cy="77" rx="5" ry="13"/>

    <!-- Ligne courbe dynamique -->
    <path d="M 20 115 Q 80 95 140 115" stroke="#1746A2" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- Texte du logo -->
  <g id="logo-text" fill="#1746A2">
    <!-- SÉCURITÉ SOCIALE -->
    <text x="200" y="50" class="logo-text logo-security" fill="#1746A2" text-anchor="start">
      SÉCURITÉ SOCIALE
    </text>

    <!-- Ameli.fr (grand texte principal) -->
    <text x="200" y="145" class="logo-text logo-ameli" fill="#1746A2">Ameli.fr</text>

    <!-- l'Assurance Maladie -->
    <text x="200" y="210" class="logo-text logo-assurance" fill="#1746A2">l'Assurance</text>
    <text x="200" y="270" class="logo-text logo-assurance" fill="#1746A2">Maladie</text>
  </g>

  <!-- Accent de couleur (point turquoise) -->
  <circle cx="185" cy="130" r="5" fill="#00B3A4" opacity="0.8"/>
</svg>